name: Build VM Disk Image

on:
  push:
    branches:
      - '*'
    tags:
      - 'v*'
  pull_request:
    branches:
      - master

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    container: ubuntu:latest
    timeout-minutes: 60
    strategy:
        fail-fast: false
        matrix:
          - { version: 6.8, architecture: x86-64 }
          - { version: 6.8, architecture: arm64 }
          - { version: 6.9, architecture: x86-64 }
          - { version: 6.9, architecture: arm64 }
          - { version: 7.1, architecture: x86-64 }
          - { version: 7.1, architecture: arm64 }
          - { version: 7.2, architecture: x86-64 }
          - { version: 7.2, architecture: arm64 }
          - { version: 7.3, architecture: x86-64 }
          - { version: 7.3, architecture: arm64 }
          - { version: 7.4, architecture: x86-64 }
          - { version: 7.4, architecture: arm64 }
          - { version: 7.5, architecture: x86-64 }
          - { version: 7.5, architecture: arm64 }
          - { version: 7.6, architecture: x86-64, snapshot: true }
          - { version: 7.6, architecture: arm64, snapshot: true }

    steps:
      - name: Clone Repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install Dependencies
        run: apt update && apt install curl unzip "qemu-system-$QEMU_ARCHITECTURE" -y
        env:
          QEMU_ARCHITECTURE: ${{
              matrix.architecture == 'x86-64' && 'x86' ||
              matrix.architecture == 'arm64' && 'aarch64' ||
              matrix.architecture
            }}

      - uses: hashicorp/setup-packer@main
        with:
          version: "1.7.1"

      - name: Install UEFI
        if: matrix.architecture == 'x86-64'
        run: |
          bash -c "apt update
          apt install ovmf
          cp /usr/share/ovmf/OVMF.fd resources/ovmf.fd"


      - name: Download QEMU UEFI
        if: matrix.architecture == 'arm64'
        run: curl -o resources/qemu_efi.fd -L https://releases.linaro.org/components/kernel/uefi-linaro/latest/release/qemu64/QEMU_EFI.fd

      # - name: Setup tmate session
      #   uses: mxschmitt/action-tmate@v3

      - name: Get latest snapshot checksum
        id: snapshot_checksum
        if: matrix.snapshot == true
        run: |
          arch="$(if [[ "${{ matrix.architecture }}" == "x86-64" ]]; then echo "amd64"; else echo "${{ matrix.architecture }}"; fi)"
          url="https://cdn.openbsd.org/pub/OpenBSD/snapshots/$arch/SHA256"
          img="miniroot$(echo "${{ matrix.version }}" | tr -d ".").img"
          echo "SHA=$(curl url | grep "$img" | awk '{print $NF}')" >> $GITHUB_OUTPUT

      - name: Build Image
        if: matrix.snapshot == false
        run: |
          PACKER_LOG=1 ./build.sh \
            '${{ matrix.version }}' \
            '${{ matrix.architecture }}' \
            -var 'headless=true' \
            -var 'readonly_boot_media=false'

      - name: Build Image
        if: matrix.snapshot == true
        run: |
          PACKER_LOG=1 ./build.sh \
            '${{ matrix.version }}' \
            '${{ matrix.architecture }}' \
            -var 'checksum=${{ steps.snapshot_checksum.outputs.SHA }}' \
            -var 'headless=true' \
            -var 'readonly_boot_media=false'

      - name: Extract Version
        id: version
        if: startsWith(github.ref, 'refs/tags/v')
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Create Release
        id: create_release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: OpenBSD ${{ steps.version.outputs.VERSION }}
          draft: true
          files: output/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
